[package]
name = "rvm-kernel"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "Top-level integration kernel for the RVM microhypervisor"
keywords = ["hypervisor", "kernel", "coherence", "no_std"]
categories = ["no-std", "embedded", "os"]

[lib]
crate-type = ["rlib"]

[[bin]]
name = "rvm"
path = "src/main.rs"

[dependencies]
rvm-types = { workspace = true }
rvm-hal = { workspace = true }
rvm-cap = { workspace = true }
rvm-witness = { workspace = true }
rvm-proof = { workspace = true }
rvm-partition = { workspace = true }
rvm-sched = { workspace = true }
rvm-memory = { workspace = true }
rvm-coherence = { workspace = true }
rvm-boot = { workspace = true }
rvm-wasm = { workspace = true }
rvm-security = { workspace = true }

[features]
default = ["crypto-sha256"]
crypto-sha256 = ["rvm-witness/crypto-sha256", "rvm-proof/crypto-sha256"]
std = [
    "rvm-types/std",
    "rvm-hal/std",
    "rvm-cap/std",
    "rvm-witness/std",
    "rvm-proof/std",
    "rvm-partition/std",
    "rvm-sched/std",
    "rvm-memory/std",
    "rvm-coherence/std",
    "rvm-boot/std",
    "rvm-wasm/std",
    "rvm-security/std",
]
alloc = [
    "rvm-types/alloc",
    "rvm-hal/alloc",
    "rvm-cap/alloc",
    "rvm-witness/alloc",
    "rvm-proof/alloc",
    "rvm-partition/alloc",
    "rvm-sched/alloc",
    "rvm-memory/alloc",
    "rvm-coherence/alloc",
    "rvm-boot/alloc",
    "rvm-wasm/alloc",
    "rvm-security/alloc",
]
## Enable WebAssembly guest support.
wasm = []
## Enable coherence engine integration.
coherence = []
## Enable coherence-scheduler feedback loop.
coherence-sched = ["rvm-coherence/sched"]
