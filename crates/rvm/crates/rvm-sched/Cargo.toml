[package]
name = "rvm-sched"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "Coherence-aware scheduler for the RVM microhypervisor (ADR-132 DC-4)"
keywords = ["hypervisor", "scheduler", "coherence", "no_std"]
categories = ["no-std", "embedded", "os"]

[lib]
crate-type = ["rlib"]

[dependencies]
rvm-types = { workspace = true }
rvm-partition = { workspace = true }
rvm-witness = { workspace = true }
spin = { workspace = true }

[features]
default = []
std = ["rvm-types/std", "rvm-partition/std", "rvm-witness/std"]
alloc = ["rvm-types/alloc", "rvm-partition/alloc", "rvm-witness/alloc"]
