[package]
name = "rvm-proof"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "Proof-gated state transitions for the RVM microhypervisor (ADR-135)"
keywords = ["hypervisor", "proof", "attestation", "no_std"]
categories = ["no-std", "embedded", "os"]

[lib]
crate-type = ["rlib"]

[dependencies]
rvm-types = { workspace = true }
rvm-cap = { workspace = true }
rvm-witness = { workspace = true }
spin = { workspace = true }
sha2 = { version = "0.10", default-features = false, optional = true }
subtle = { workspace = true }
hmac = { version = "0.12", default-features = false, optional = true }
ed25519-dalek = { version = "2.1", default-features = false, optional = true }

[features]
default = ["crypto-sha256", "strict-signing"]
std = ["rvm-types/std", "rvm-cap/std", "rvm-witness/std"]
alloc = ["rvm-types/alloc", "rvm-cap/alloc", "rvm-witness/alloc"]
crypto-sha256 = ["dep:sha2", "dep:hmac"]
ed25519 = ["dep:ed25519-dalek", "crypto-sha256"]
null-signer = []
strict-signing = []
