<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RuVector - Demos</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --card: #1a1a24;
            --accent: #6366f1;
            --text: #f1f5f9;
            --text-dim: #94a3b8;
            --border: #2d2d3a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 600px;
            padding: 2rem;
            text-align: center;
        }
        h1 {
            font-size: 3rem;
            background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            color: var(--text-dim);
            margin-bottom: 2rem;
        }
        .demos {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .demo-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1.5rem;
            text-decoration: none;
            color: var(--text);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .demo-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.2);
        }
        .demo-icon {
            font-size: 2.5rem;
        }
        .demo-info { text-align: left; }
        .demo-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }
        .demo-desc {
            color: var(--text-dim);
            font-size: 0.9rem;
        }
        .links {
            margin-top: 2rem;
            display: flex;
            gap: 1rem;
            justify-content: center;
        }
        .links a {
            color: var(--accent);
            text-decoration: none;
        }
        .links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>RuVector</h1>
        <p class="subtitle">High-performance vector operations in Rust + WASM</p>

        <div class="demos">
            <a href="./demo/cnn/" class="demo-card">
                <span class="demo-icon">🧠</span>
                <div class="demo-info">
                    <div class="demo-title">CNN Image Embeddings</div>
                    <div class="demo-desc">Extract 512-dim features from images in ~5ms. Compare similarity, visualize embeddings.</div>
                </div>
            </a>
        </div>

        <div class="links">
            <a href="https://github.com/ruvnet/ruvector">GitHub</a>
            <a href="https://www.npmjs.com/package/@ruvector/cnn">npm</a>
            <a href="https://crates.io/crates/ruvector-cnn">crates.io</a>
        </div>
    </div>
</body>
</html>
